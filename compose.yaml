services:
  frontend:
    image: energy-frontend-demo:local
    pull_policy: build
    build:
      context: ./energy-frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:1.27-alpine}
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
